name: Build patched Velero image

on:
  workflow_dispatch:
    inputs:
      velero-tag:
        description: "Velero upstream version tag (e.g. v1.15.0)"
        required: true
        default: "v1.15.0"
      tag:
        description: "Tag to create in this repository (e.g. v1.15.0-patched)"
        required: true
        default: "v1.15.0-patched"
      force-create:
        type: boolean
        description: "Force tag creation even if tag already exists"
        required: false
        default: true
      platforms:
        description: "Platforms to build (comma-separated, e.g. linux/amd64,linux/arm64)"
        required: false
        default: "linux/amd64,linux/arm64"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout upstream Velero source
        uses: actions/checkout@v6.0.2
        with:
          repository: vmware-tanzu/velero
          ref: ${{ inputs.velero-tag }}
          path: velero-src

      - name: Checkout this repository (patches)
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}
          path: velero-patches

      - name: Apply patches
        run: |
          PATCHES_DIR="${GITHUB_WORKSPACE}/velero-patches/patches/${{ inputs.velero-tag }}"
          if [ ! -d "${PATCHES_DIR}" ]; then
            echo "No patches directory found at ${PATCHES_DIR}, skipping patch step."
          else
            cd "${GITHUB_WORKSPACE}/velero-src"
            shopt -s nullglob
            patches=("${PATCHES_DIR}"/*.patch)
            if [ ${#patches[@]} -eq 0 ]; then
              echo "No *.patch files found in ${PATCHES_DIR}, skipping."
            else
              for p in "${patches[@]}"; do
                echo "Applying ${p}..."
                git apply -p1 --ignore-space-change --ignore-whitespace "${p}"
              done
            fi
          fi
          rm -rf "${GITHUB_WORKSPACE}/velero-patches"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Collect build metadata
        id: meta
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "repo_owner_lc=${owner}" >> $GITHUB_OUTPUT
          cd "${GITHUB_WORKSPACE}/velero-src"
          echo "git_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "git_tree_state=clean"          >> $GITHUB_OUTPUT
          VERSION="${{ inputs.velero-tag }}"
          echo "version=${VERSION#v}"          >> $GITHUB_OUTPUT
          echo "restic_version=$(grep -m1 'RESTIC_VERSION ?=' Makefile | awk -F'= ' '{print $2}')" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/velero-src
          file: ${{ github.workspace }}/velero-src/Dockerfile
          platforms: ${{ inputs.platforms }}
          provenance: false
          sbom: false
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_owner_lc }}/${{ github.event.repository.name }}:${{ inputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo_owner_lc }}/${{ github.event.repository.name }}:${{ inputs.velero-tag }}-patched
          build-args: |
            PKG=github.com/vmware-tanzu/velero
            BIN=velero
            VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            GIT_TREE_STATE=${{ steps.meta.outputs.git_tree_state }}
            REGISTRY=ghcr.io/${{ steps.meta.outputs.repo_owner_lc }}
            RESTIC_VERSION=${{ steps.meta.outputs.restic_version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}